<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Applications – AgroHub</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --green: #16a34a;
            --green-dark: #15803d;
            --green-light: #dcfce7;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f0fdf4;
            --white: #ffffff;
            --serif: 'Playfair Display', serif;
            --sans: 'Inter', sans-serif;
            --radius: 16px;
            --shadow-sm: 0 1px 4px rgba(0, 0, 0, .06);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, .08);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, .12);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── PAGE HEADER BANNER ─────────────────────────────── */
        .page-banner {
            background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 60%, #16a34a 100%);
            padding: 2rem 2.5rem 5rem;
            position: relative;
            overflow: hidden;
        }

        .page-banner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--bg);
            border-radius: 50% 50% 0 0 / 30px 30px 0 0;
        }

        .banner-back {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            color: rgba(255, 255, 255, .8);
            text-decoration: none;
            font-size: .9rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            transition: color .2s;
        }

        .banner-back:hover {
            color: #fff;
        }

        .banner-title {
            font-family: var(--serif);
            font-size: 2.2rem;
            color: var(--white);
            margin-bottom: .35rem;
        }

        .banner-sub {
            color: rgba(255, 255, 255, .7);
            font-size: .95rem;
        }

        /* ── MAIN CONTENT ───────────────────────────────────── */
        .main-wrap {
            max-width: 900px;
            margin: -3rem auto 3rem;
            padding: 0 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* ── JOB INFO CARD ─────────────────────────────────── */
        .job-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.75rem;
            border-left: 5px solid var(--green);
        }

        .job-card-title {
            font-family: var(--serif);
            font-size: 1.4rem;
            margin-bottom: .4rem;
        }

        .job-status-pill {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            padding: .3rem .85rem;
            border-radius: 50px;
            font-size: .8rem;
            font-weight: 600;
            background: var(--green-light);
            color: var(--green-dark);
        }

        .stat-pills {
            display: flex;
            gap: .75rem;
        }

        .stat-pill {
            text-align: center;
            background: var(--bg);
            border-radius: 12px;
            padding: .6rem 1.1rem;
            border: 1px solid var(--border);
        }

        .stat-pill .num {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--green);
            line-height: 1;
        }

        .stat-pill .lbl {
            font-size: .7rem;
            color: var(--muted);
            margin-top: .2rem;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        /* ── APPLICANT CARD ────────────────────────────────── */
        .applicant-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            margin-bottom: 1.25rem;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: box-shadow .25s, transform .25s;
        }

        .applicant-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        /* Card Top Strip */
        .card-strip {
            height: 5px;
            background: linear-gradient(90deg, var(--green), #34d399);
        }

        .card-strip.hired {
            background: linear-gradient(90deg, #2563eb, #60a5fa);
        }

        .card-body {
            padding: 1.75rem 2rem;
        }

        /* Worker header row */
        .worker-row {
            display: flex;
            gap: 1.25rem;
            align-items: flex-start;
            margin-bottom: 1.25rem;
        }

        .avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .avatar {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            border: 3px solid var(--green-light);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-status {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #22c55e;
            border: 2px solid #fff;
        }

        .avatar-status.hired {
            background: #3b82f6;
        }

        .worker-info {
            flex: 1;
            min-width: 0;
        }

        .worker-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: .15rem;
        }

        .worker-role {
            font-size: .9rem;
            color: var(--green);
            font-weight: 600;
            margin-bottom: .5rem;
        }

        .worker-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            font-size: .82rem;
            color: var(--muted);
        }

        .meta-chip .material-icons-outlined {
            font-size: 1rem;
            color: var(--green);
        }

        /* Badge top-right */
        .status-badge {
            flex-shrink: 0;
            padding: .35rem .9rem;
            border-radius: 50px;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: .03em;
            display: inline-flex;
            align-items: center;
            gap: .3rem;
        }

        .badge-pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .badge-hired {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .badge-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Info grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .info-block {
            background: #f9fafb;
            border-radius: 10px;
            padding: 1rem;
        }

        .info-block-label {
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            margin-bottom: .5rem;
        }

        .info-block-text {
            font-size: .9rem;
            color: var(--text);
            line-height: 1.6;
        }

        /* Card footer */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
        }

        .contact-warning {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            font-size: .85rem;
            color: #92400e;
            background: #fffbeb;
            border: 1px solid #fde68a;
            padding: .45rem 1rem;
            border-radius: 50px;
        }

        .contact-warning .material-icons-outlined {
            font-size: 1rem;
        }

        .contact-links {
            display: flex;
            gap: .75rem;
            flex-wrap: wrap;
        }

        .contact-link {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .5rem 1rem;
            border-radius: 8px;
            font-size: .85rem;
            font-weight: 600;
            text-decoration: none;
            transition: background .2s;
        }

        .contact-link.phone {
            background: #ecfdf5;
            color: #065f46;
        }

        .contact-link.email {
            background: #eff6ff;
            color: #1e40af;
        }

        .contact-link:hover {
            filter: brightness(.93);
        }

        .contact-link .material-icons-outlined {
            font-size: 1rem;
        }

        .hire-btn {
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #fff;
            border: none;
            padding: .75rem 1.6rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: .92rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            box-shadow: 0 4px 14px rgba(22, 163, 74, .3);
            transition: all .3s;
            font-family: var(--sans);
        }

        .hire-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(22, 163, 74, .4);
        }

        .hire-btn:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .hired-badge-card {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .55rem 1.2rem;
            background: #dbeafe;
            color: #1d4ed8;
            border-radius: 50px;
            font-weight: 700;
            font-size: .9rem;
            border: 1px solid #bfdbfe;
        }

        /* ── EMPTY / LOADING ───────────────────────────────── */
        .empty-state,
        .loading-state {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--muted);
        }

        .empty-state .icon,
        .loading-state .icon {
            font-size: 4rem;
            opacity: .4;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: .4rem;
        }

        /* ── HIRE MODAL ────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9000;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            background: #fff;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, .2);
            transform: translateY(30px) scale(.96);
            transition: transform .35s cubic-bezier(.34, 1.4, .64, 1);
        }

        .modal-overlay.open .modal-box {
            transform: translateY(0) scale(1);
        }

        .modal-icon-ring {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 0 0 8px rgba(22, 163, 74, .08);
        }

        .modal-icon-ring .material-icons-outlined {
            font-size: 2.2rem;
            color: var(--green);
        }

        .modal-title {
            font-family: var(--serif);
            font-size: 1.65rem;
            color: var(--text);
            margin-bottom: .6rem;
        }

        .modal-subtitle {
            color: var(--muted);
            font-size: .97rem;
            line-height: 1.6;
            margin-bottom: .9rem;
        }

        .modal-subtitle strong {
            color: var(--text);
        }

        .modal-note {
            display: flex;
            align-items: flex-start;
            gap: .5rem;
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 10px;
            padding: .75rem 1rem;
            font-size: .84rem;
            color: #92400e;
            text-align: left;
            margin-bottom: 1.75rem;
            line-height: 1.5;
        }

        .modal-note .material-icons-outlined {
            font-size: 1rem;
            flex-shrink: 0;
            color: #d97706;
            margin-top: .1rem;
        }

        .modal-btns {
            display: flex;
            gap: .75rem;
        }

        .modal-cancel {
            flex: 1;
            padding: .875rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: #fff;
            color: var(--muted);
            font-weight: 600;
            font-size: .95rem;
            cursor: pointer;
            font-family: var(--sans);
            transition: all .2s;
        }

        .modal-cancel:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        .modal-confirm {
            flex: 1.5;
            padding: .875rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #fff;
            font-weight: 700;
            font-size: .95rem;
            cursor: pointer;
            font-family: var(--sans);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .45rem;
            box-shadow: 0 4px 14px rgba(22, 163, 74, .3);
            transition: all .3s;
        }

        .modal-confirm:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(22, 163, 74, .4);
        }

        .modal-confirm:disabled {
            opacity: .7;
            cursor: not-allowed;
            transform: none;
        }

        /* ── TOAST ─────────────────────────────────────────── */
        .toast {
            position: fixed;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            padding: .9rem 1.75rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: .92rem;
            z-index: 9999;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .14);
            transition: top .4s cubic-bezier(.34, 1.4, .64, 1);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .toast.show {
            top: 1.5rem;
        }

        .toast.success {
            background: #16a34a;
            color: #fff;
        }

        .toast.error {
            background: #dc2626;
            color: #fff;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body>

    <!-- ── PAGE HEADER BANNER ── -->
    <div class="page-banner">
        <a href="my-posted-jobs.html" class="banner-back">
            <span class="material-icons-outlined" style="font-size:1.1rem;">arrow_back</span>
            Back to My Jobs
        </a>
        <h1 class="banner-title">Manage Applications</h1>
        <p class="banner-sub" id="bannerSub">Loading job details…</p>
    </div>

    <!-- ── MAIN CONTENT ── -->
    <div class="main-wrap">

        <!-- Job Summary Card -->
        <div class="job-card" id="jobCard" style="display:none;">
            <div>
                <div class="job-card-title" id="jobCardTitle">—</div>
                <span class="job-status-pill">
                    <span class="material-icons-outlined" style="font-size:.9rem;">circle</span>
                    <span id="jobCardStatus">—</span>
                </span>
            </div>
            <div class="stat-pills" id="statPills"></div>
        </div>

        <!-- Applicants List -->
        <div id="applicantsList">
            <div class="loading-state">
                <div class="icon">
                    <span class="material-icons-outlined spin" style="font-size:3.5rem;">hourglass_empty</span>
                </div>
                <p>Loading applicants…</p>
            </div>
        </div>
    </div>

    <!-- ── HIRE MODAL ── -->
    <div class="modal-overlay" id="hireModal">
        <div class="modal-box">
            <div class="modal-icon-ring">
                <span class="material-icons-outlined">handshake</span>
            </div>
            <h2 class="modal-title">Confirm Hire</h2>
            <p class="modal-subtitle">
                You are about to hire <strong id="modalWorkerName">this worker</strong>.
            </p>
            <div class="modal-note">
                <span class="material-icons-outlined">info</span>
                <span>This will <strong>close the job opening</strong> and reveal the worker's phone &amp; email so you
                    can get in touch directly.</span>
            </div>
            <div class="modal-btns">
                <button class="modal-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-confirm" id="modalConfirmBtn">
                    <span class="material-icons-outlined" style="font-size:1.1rem;">check_circle</span>
                    Yes, Hire Worker
                </button>
            </div>
        </div>
    </div>

    <!-- ── TOAST ── -->
    <div class="toast" id="toast"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const jobId = params.get('job_id');
        const token = localStorage.getItem('agrohub_token');

        if (!token) window.location.href = 'login.html';

        /* ── LOAD ──────────────────────────────────────────── */
        async function loadApplications() {
            if (!jobId) {
                showError('No job selected. Please go back and try again.');
                return;
            }
            try {
                const res = await fetch(`php/get_job_applications.php?job_id=${jobId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();

                if (data.success) {
                    renderJobCard(data.job, data.applications);
                    renderApplicants(data.applications, data.job.status);
                } else {
                    showError(data.message || 'Could not load applications.');
                }
            } catch (e) {
                console.error(e);
                showError('Connection failed. Please refresh and try again.');
            }
        }

        /* ── JOB CARD ──────────────────────────────────────── */
        function renderJobCard(job, apps) {
            document.getElementById('bannerSub').textContent = job.job_title + ' · ' + job.location;
            document.getElementById('jobCardTitle').textContent = job.job_title;
            document.getElementById('jobCardStatus').textContent = job.status;

            const hired = apps.filter(a => a.status === 'Hired').length;
            const pending = apps.filter(a => a.status === 'Applied').length;

            document.getElementById('statPills').innerHTML = `
                <div class="stat-pill">
                    <div class="num">${apps.length}</div>
                    <div class="lbl">Total</div>
                </div>
                <div class="stat-pill">
                    <div class="num">${pending}</div>
                    <div class="lbl">Pending</div>
                </div>
                <div class="stat-pill">
                    <div class="num">${hired}</div>
                    <div class="lbl">Hired</div>
                </div>
            `;
            document.getElementById('jobCard').style.display = 'flex';
        }

        /* ── APPLICANT CARDS ───────────────────────────────── */
        function renderApplicants(apps, jobStatus) {
            const list = document.getElementById('applicantsList');

            if (!apps.length) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">
                            <span class="material-icons-outlined" style="font-size:4rem;">people_outline</span>
                        </div>
                        <h3>No Applicants Yet</h3>
                        <p>Your job hasn't received any applications yet. Check back soon!</p>
                    </div>`;
                return;
            }

            const jobFilled = jobStatus === 'Hired' || jobStatus === 'In Progress';

            list.innerHTML = apps.map(app => {
                const isHired = app.status === 'Hired';
                const stripCls = isHired ? 'hired' : '';
                const statusCls = isHired ? 'badge-hired' : (app.status === 'Rejected' ? 'badge-rejected' : 'badge-pending');
                const statusLbl = isHired ? 'Hired' : (app.status === 'Rejected' ? 'Declined' : 'Pending');
                const statusIcon = isHired ? 'check_circle' : (app.status === 'Rejected' ? 'cancel' : 'pending');
                const avatarStatusCls = isHired ? 'hired' : '';

                const avatarContent = (app.profile_picture && app.profile_picture.startsWith('data:'))
                    ? `<img src="${app.profile_picture}" alt="${app.name}">`
                    : (app.name ? app.name.charAt(0).toUpperCase() : '?');

                const appliedDate = new Date(app.applied_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

                /* Footer */
                let footer = '';
                if (isHired) {
                    footer = `
                        <div class="contact-links">
                            <a href="tel:${app.phone}" class="contact-link phone">
                                <span class="material-icons-outlined">call</span>${app.phone || 'N/A'}
                            </a>
                            <a href="job-chat.html?job_id=${jobId}&role=farmer&other_name=${encodeURIComponent(app.name)}&job_title=${encodeURIComponent(document.getElementById('jobCardTitle').textContent)}&back=manage_applications.html&back_job_id=${jobId}"
                               class="contact-link" style="background:linear-gradient(135deg,#ede9fe,#ddd6fe);color:#6d28d9;font-weight:700;">
                                <span class="material-icons-outlined">chat</span>Message Worker
                            </a>
                        </div>
                        <div class="hired-badge-card">
                            <span class="material-icons-outlined" style="font-size:1.1rem;">verified</span>
                            Hired
                        </div>`;

                } else if (jobFilled) {
                    footer = `
                        <div class="contact-warning">
                            <span class="material-icons-outlined">visibility_off</span>
                            Contact hidden until hired
                        </div>
                        <button class="hire-btn" disabled>Job Already Filled</button>`;
                } else {
                    footer = `
                        <div class="contact-warning">
                            <span class="material-icons-outlined">visibility_off</span>
                            Contact details hidden until hired
                        </div>
                        <button class="hire-btn" onclick="openHireModal(${app.application_id}, '${app.name.replace(/'/g, "\\'")}')">
                            <span class="material-icons-outlined" style="font-size:1.1rem;">handshake</span>
                            Hire Worker
                        </button>`;
                }

                return `
                <div class="applicant-card">
                    <div class="card-strip ${stripCls}"></div>
                    <div class="card-body">
                        <div class="worker-row">
                            <div class="avatar-wrap">
                                <div class="avatar">${avatarContent}</div>
                                <div class="avatar-status ${avatarStatusCls}"></div>
                            </div>
                            <div class="worker-info">
                                <div class="worker-name">${app.name}</div>
                                <div class="worker-role">${app.worker_role || 'General Worker'}</div>
                                <div class="worker-meta">
                                    <span class="meta-chip">
                                        <span class="material-icons-outlined">work_history</span>
                                        ${app.general_experience || 0} yrs exp
                                    </span>
                                    <span class="meta-chip">
                                        <span class="material-icons-outlined">location_on</span>
                                        ${app.location || 'N/A'}
                                    </span>
                                    <span class="meta-chip">
                                        <span class="material-icons-outlined">schedule</span>
                                        Applied ${appliedDate}
                                    </span>
                                </div>
                            </div>
                            <div>
                                <span class="status-badge ${statusCls}">
                                    <span class="material-icons-outlined" style="font-size:.9rem;">${statusIcon}</span>
                                    ${statusLbl}
                                </span>
                            </div>
                        </div>

                        <div class="info-grid">
                            <div class="info-block">
                                <div class="info-block-label">Application Message</div>
                                <div class="info-block-text">${app.message || 'No message provided.'}</div>
                            </div>
                            <div class="info-block">
                                <div class="info-block-label">Relevant Skills &amp; Details</div>
                                <div class="info-block-text">${app.bio || app.specific_experience || 'No additional details provided.'}</div>
                            </div>
                        </div>

                        <div class="card-footer">${footer}</div>
                    </div>
                </div>`;
            }).join('');
        }

        /* ── MODAL ─────────────────────────────────────────── */
        function openHireModal(appId, workerName) {
            document.getElementById('modalWorkerName').textContent = workerName;
            document.getElementById('hireModal').classList.add('open');

            const oldBtn = document.getElementById('modalConfirmBtn');
            const newBtn = oldBtn.cloneNode(true);
            oldBtn.parentNode.replaceChild(newBtn, oldBtn);

            newBtn.addEventListener('click', async () => {
                newBtn.innerHTML = '<span class="material-icons-outlined spin" style="font-size:1.1rem;">sync</span> Processing…';
                newBtn.disabled = true;

                try {
                    const res = await fetch('php/hire_worker.php?token=' + token, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ application_id: appId, job_id: jobId })
                    });
                    const result = await res.json();
                    closeModal();

                    if (result.success) {
                        showToast('✅ ' + workerName + ' has been hired! Contact details are now visible.', 'success');
                        setTimeout(loadApplications, 1600);
                    } else {
                        showToast('❌ ' + (result.message || 'Could not complete hire.'), 'error');
                    }
                } catch {
                    closeModal();
                    showToast('❌ Connection error. Please try again.', 'error');
                }
            });
        }

        function closeModal() {
            document.getElementById('hireModal').classList.remove('open');
        }

        /* Close on backdrop click */
        document.getElementById('hireModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        /* ── TOAST ─────────────────────────────────────────── */
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 4000);
        }

        /* ── ERROR STATE ───────────────────────────────────── */
        function showError(msg) {
            document.getElementById('applicantsList').innerHTML = `
                <div class="empty-state">
                    <div class="icon"><span class="material-icons-outlined" style="font-size:4rem;">error_outline</span></div>
                    <h3>Something went wrong</h3>
                    <p>${msg}</p>
                </div>`;
        }

        document.addEventListener('DOMContentLoaded', loadApplications);
    </script>
</body>

</html>
