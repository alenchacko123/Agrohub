<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message – AgroHub</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #16a34a;
            --gdark: #15803d;
            --glight: #dcfce7;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f0fdf4;
            --white: #ffffff;
            --sans: 'Inter', sans-serif;
            --bubble-out: #16a34a;
            --bubble-in: #f3f4f6;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOP BAR ─────────────────────────────────────────── */
        .topbar {
            background: linear-gradient(135deg, #1b4332, #16a34a);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .15);
        }

        .back-btn {
            background: rgba(255, 255, 255, .15);
            border: none;
            color: #fff;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, .25);
        }

        .back-btn .material-icons-outlined {
            font-size: 1.2rem;
            color: #fff;
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 700;
            color: #fff;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-sub {
            font-size: .78rem;
            color: rgba(255, 255, 255, .75);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, .6);
            flex-shrink: 0;
        }

        /* ── MESSAGES AREA ───────────────────────────────────── */
        .messages-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: .65rem;
            scroll-behavior: smooth;
        }

        .date-divider {
            text-align: center;
            font-size: .75rem;
            color: var(--muted);
            margin: .5rem 0;
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .date-divider::before,
        .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .bubble-row {
            display: flex;
            align-items: flex-end;
            gap: .5rem;
        }

        .bubble-row.out {
            flex-direction: row-reverse;
        }

        .bubble-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .bubble-avatar.in-av {
            background: #d1fae5;
            color: #065f46;
        }

        .bubble-avatar.out-av {
            background: var(--green);
            color: #fff;
        }

        .bubble {
            max-width: 70%;
            padding: .65rem 1rem;
            border-radius: 18px;
            font-size: .9rem;
            line-height: 1.5;
            position: relative;
            word-break: break-word;
        }

        .bubble.in {
            background: var(--bubble-in);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .bubble.out {
            background: var(--bubble-out);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .bubble-time {
            font-size: .68rem;
            margin-top: .25rem;
            opacity: .65;
        }

        .bubble-row.in .bubble-time {
            text-align: left;
            margin-left: 38px;
            color: var(--muted);
        }

        .bubble-row.out .bubble-time {
            text-align: right;
            margin-right: 38px;
            color: var(--muted);
        }

        /* ── EMPTY STATE ─────────────────────────────────────── */
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            gap: .75rem;
            padding: 2rem;
            text-align: center;
        }

        .empty-chat .material-icons-outlined {
            font-size: 3.5rem;
            opacity: .35;
        }

        .empty-chat p {
            font-size: .9rem;
        }

        /* ── INPUT BAR ───────────────────────────────────────── */
        .input-bar {
            background: var(--white);
            border-top: 1px solid var(--border);
            padding: .875rem 1rem;
            display: flex;
            align-items: flex-end;
            gap: .75rem;
            flex-shrink: 0;
        }

        .input-wrap {
            flex: 1;
            background: #f9fafb;
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: .6rem 1rem;
            display: flex;
            align-items: flex-end;
            gap: .5rem;
            transition: border-color .2s;
        }

        .input-wrap:focus-within {
            border-color: var(--green);
            background: #fff;
        }

        #msgInput {
            flex: 1;
            border: none;
            background: transparent;
            font-family: var(--sans);
            font-size: .92rem;
            resize: none;
            outline: none;
            max-height: 100px;
            line-height: 1.4;
            color: var(--text);
        }

        #msgInput::placeholder {
            color: #9ca3af;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green), var(--gdark));
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(22, 163, 74, .3);
            flex-shrink: 0;
            transition: all .2s;
        }

        .send-btn:hover {
            transform: scale(1.07);
            box-shadow: 0 6px 18px rgba(22, 163, 74, .4);
        }

        .send-btn:disabled {
            background: #d1d5db;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn .material-icons-outlined {
            font-size: 1.3rem;
        }

        /* ── LOADING ─────────────────────────────────────────── */
        .loading-msg {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
            font-size: .9rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        /* ── SCROLLBAR ───────────────────────────────────────── */
        .messages-wrap::-webkit-scrollbar {
            width: 5px;
        }

        .messages-wrap::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-wrap::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <div class="topbar" id="topbar">
        <a class="back-btn" id="backBtn" href="my-jobs.html">
            <span class="material-icons-outlined">arrow_back</span>
        </a>
        <div class="chat-avatar" id="chatAvatar">?</div>
        <div class="chat-info">
            <div class="chat-name" id="chatName">Loading…</div>
            <div class="chat-sub" id="chatSub">Job chat</div>
        </div>
        <div class="online-dot" title="Live updates active"></div>
    </div>

    <!-- Messages -->
    <div class="messages-wrap" id="messagesWrap">
        <div class="loading-msg">
            <span class="material-icons-outlined spin" style="font-size:2rem;">hourglass_empty</span>
            <p>Loading messages…</p>
        </div>
    </div>

    <!-- Input -->
    <div class="input-bar">
        <div class="input-wrap">
            <textarea id="msgInput" rows="1" placeholder="Type a message…"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <span class="material-icons-outlined">send</span>
        </button>
    </div>

    <script>
        /* ── PARAMS ────────────────────────────────────────────────── */
        const params = new URLSearchParams(window.location.search);
        const jobId = parseInt(params.get('job_id') || 0);
        const myRole = params.get('role') || 'worker';  // 'worker' or 'farmer'
        const otherName = decodeURIComponent(params.get('other_name') || 'Farmer');
        const jobTitle = decodeURIComponent(params.get('job_title') || 'Job');
        const backPage = params.get('back') || (myRole === 'farmer' ? 'manage_applications.html' : 'my-jobs.html');

        /* ── USER ──────────────────────────────────────────────────── */
        let myId = 0;
        try {
            const u = JSON.parse(localStorage.getItem('agrohub_user') || localStorage.getItem('userData') || '{}');
            myId = u.id || u.user_id || 0;
        } catch (e) { }

        /* ── INIT ──────────────────────────────────────────────────── */
        let lastId = 0;
        let pollTimer = null;

        document.getElementById('backBtn').href = backPage + (backPage.includes('?') ? '&' : '?') + 'job_id=' + (params.get('back_job_id') || jobId);
        document.getElementById('chatAvatar').textContent = otherName.charAt(0).toUpperCase();
        document.getElementById('chatName').textContent = otherName;
        document.getElementById('chatSub').textContent = jobTitle;

        /* Auto-resize textarea */
        const input = document.getElementById('msgInput');
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 100) + 'px';
        });
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        /* ── LOAD MESSAGES ─────────────────────────────────────────── */
        async function loadMessages(since = 0) {
            try {
                const r = await fetch(`php/job_messages.php?job_id=${jobId}&user_id=${myId}&since=${since}`);
                const d = await r.json();
                if (d.success) {
                    if (since === 0) {
                        renderAll(d.messages);
                    } else if (d.messages.length) {
                        appendNew(d.messages);
                    }
                    if (d.messages.length) {
                        lastId = d.messages[d.messages.length - 1].id;
                    }
                }
            } catch (e) { console.error(e); }
        }

        /* ── RENDER ALL ────────────────────────────────────────────── */
        function renderAll(msgs) {
            const wrap = document.getElementById('messagesWrap');
            if (!msgs.length) {
                wrap.innerHTML = `
                <div class="empty-chat">
                    <span class="material-icons-outlined">chat_bubble_outline</span>
                    <p>No messages yet.<br>Start the conversation by sending a message below!</p>
                </div>`;
                return;
            }
            wrap.innerHTML = '';
            let lastDate = '';
            msgs.forEach(m => {
                const d = new Date(m.created_at);
                const dateStr = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                if (dateStr !== lastDate) {
                    const div = document.createElement('div');
                    div.className = 'date-divider';
                    div.textContent = dateStr;
                    wrap.appendChild(div);
                    lastDate = dateStr;
                }
                wrap.appendChild(buildBubble(m));
            });
            scrollBottom();
        }

        /* ── APPEND NEW ────────────────────────────────────────────── */
        function appendNew(msgs) {
            const wrap = document.getElementById('messagesWrap');
            // Remove empty-chat if present
            const empty = wrap.querySelector('.empty-chat');
            if (empty) empty.remove();

            msgs.forEach(m => wrap.appendChild(buildBubble(m)));
            scrollBottom();
        }

        /* ── BUILD BUBBLE ──────────────────────────────────────────── */
        function buildBubble(m) {
            const isOut = parseInt(m.sender_id) === myId;
            const time = new Date(m.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            const label = isOut ? 'You' : otherName.split(' ')[0];
            const avCls = isOut ? 'out-av' : 'in-av';
            const initial = (isOut ? 'You' : otherName).charAt(0).toUpperCase();

            const frag = document.createDocumentFragment();

            const row = document.createElement('div');
            row.className = 'bubble-row ' + (isOut ? 'out' : 'in');

            const av = document.createElement('div');
            av.className = 'bubble-avatar ' + avCls;
            av.textContent = initial;

            const bubble = document.createElement('div');
            bubble.className = 'bubble ' + (isOut ? 'out' : 'in');
            bubble.textContent = m.message;

            row.appendChild(av);
            row.appendChild(bubble);
            frag.appendChild(row);

            const timeEl = document.createElement('div');
            timeEl.className = 'bubble-time';
            timeEl.textContent = label + '  ·  ' + time;
            frag.appendChild(timeEl);

            return frag;
        }

        /* ── SEND ──────────────────────────────────────────────────── */
        async function sendMessage() {
            const txt = input.value.trim();
            if (!txt || !myId || !jobId) return;

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            input.value = '';
            input.style.height = 'auto';

            try {
                const r = await fetch('php/job_messages.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ job_id: jobId, sender_id: myId, sender_role: myRole, message: txt })
                });
                const d = await r.json();
                if (d.success) {
                    await loadMessages(lastId);
                }
            } catch (e) { console.error(e); }
            btn.disabled = false;
            input.focus();
        }

        function scrollBottom() {
            const w = document.getElementById('messagesWrap');
            w.scrollTop = w.scrollHeight;
        }

        /* ── POLL every 4 seconds ──────────────────────────────────── */
        async function poll() {
            await loadMessages(lastId);
            pollTimer = setTimeout(poll, 4000);
        }

        /* ── BOOT ──────────────────────────────────────────────────── */
        if (!jobId || !myId) {
            document.getElementById('messagesWrap').innerHTML =
                '<div class="empty-chat"><span class="material-icons-outlined">error_outline</span><p>Invalid session. Please go back and try again.</p></div>';
        } else {
            loadMessages(0).then(() => { pollTimer = setTimeout(poll, 4000); });
        }

        window.addEventListener('beforeunload', () => clearTimeout(pollTimer));
    </script>
</body>

</html>
